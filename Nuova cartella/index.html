<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Local - 1LD</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;800&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* CARICAMENTO FOTO LOCALE */
        #bg-local {
            position: fixed;
            inset: 0;
            z-index: -1;
            /* Cerca il file nella stessa cartella */
            background-image: url('sfondo.jpg'); 
            background-size: cover;
            background-position: center;
            filter: brightness(0.5) contrast(1.1);
        }

        /* ANIMAZIONE LIQUIDA SUL VETRO */
        @keyframes liquidFlow {
            0% { backdrop-filter: blur(35px) saturate(140%); }
            50% { backdrop-filter: blur(50px) saturate(200%); }
            100% { backdrop-filter: blur(35px) saturate(140%); }
        }

        .main-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* PANNELLO TRASPARENTE PURO */
        .glass-panel {
            background: transparent !important;
            animation: liquidFlow 10s infinite ease-in-out;
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            box-shadow: 
                0 40px 100px rgba(0,0,0,0.8),
                inset 0 2px 15px rgba(255, 255, 255, 0.1),
                inset 0 -5px 20px rgba(0,0,0,0.6);
            padding: 60px;
            width: 95%;
            max-width: 1100px;
        }

        /* PULSANTI VETRO TRASPARENTE */
        .btn-glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            color: #fff;
            font-weight: 800;
            padding: 22px;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.05);
        }

        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02) translateY(-3px);
            border-color: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 2px 15px rgba(255,255,255,0.2);
        }

        .textarea-glass {
            background: rgba(0, 0, 0, 0.4) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 25px !important;
            color: #fff !important;
            padding: 25px !important;
            font-family: monospace;
        }

        #display-name {
            font-size: 5.5rem;
            font-weight: 800;
            min-height: 200px;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            background: linear-gradient(180deg, #fff 30%, rgba(255,255,255,0.2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.8));
        }

        #password-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="bg-local"></div>

<div id="password-overlay">
    <div class="glass-panel text-center" style="max-width: 450px;">
        <h1 class="fw-bold mb-5">SYSTEM</h1>
        <input type="password" id="pw-input" class="textarea-glass w-100 text-center mb-4" placeholder="PASSWORD" onkeydown="if(event.key==='Enter') unlock()">
        <button class="btn btn-glass w-100" onclick="unlock()">SBLOCCA</button>
    </div>
</div>

<div class="main-wrapper">
    <div id="app-content" class="glass-panel" style="display: none;">
        <div class="row g-5">
            <div class="col-md-5">
                <textarea id="namesInput" class="textarea-glass w-100" style="height: 450px;">Andriolo
Ayzana
Blendea
Bologna
Cabri
El kadiri
Garofalo
Kaur
Luzzari
Manera
Marcucci
Marrone
Marta
Mattiazzi
Mottola
Popescu
Salani
Signori
Spoldi
Tessadori
Tresoldi
Wadan
Zanonzelli</textarea>
            </div>
            <div class="col-md-7 d-flex flex-column justify-content-between">
                <div id="display-name">---</div>
                <div class="d-grid gap-4">
                    <button class="btn btn-glass btn-lg" id="btnRun" onclick="run()">GENERATE</button>
                    <button class="btn btn-glass" style="opacity: 0.2; font-size: 10px;" onclick="location.reload()">RESET</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function unlock() {
        if(document.getElementById('pw-input').value === "1LD.GALILEI") {
            document.getElementById('password-overlay').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        } else { alert("PASS ERRATA"); }
    }

    async function run() {
        const area = document.getElementById('namesInput');
        const display = document.getElementById('display-name');
        const btn = document.getElementById('btnRun');
        
        let names = area.value.split('\n').filter(s => s.trim() !== "");
        if(!names.length) return;

        btn.disabled = true;
        area.value = "";
        names.sort(() => Math.random() - 0.5);

        for(let i=0; i<names.length; i++) {
            // Animazione ingresso nome
            display.style.opacity = "0";
            display.style.filter = "blur(20px)";
            display.style.transform = "scale(0.8)";
            await new Promise(r => setTimeout(r, 400));
            
            display.innerText = names[i];
            display.style.transition = "all 0.6s cubic-bezier(0.2, 1, 0.3, 1)";
            display.style.opacity = "1";
            display.style.filter = "blur(0px)";
            display.style.transform = "scale(1)";
            
            area.value += (i + 1) + ". " + names[i] + "\n";
            area.scrollTop = area.scrollHeight;
            await new Promise(r => setTimeout(r, 1600));
        }
        btn.disabled = false;
    }
</script>
</body>
</html>
